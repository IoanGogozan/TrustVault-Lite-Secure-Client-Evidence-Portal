services:
  postgres:
    image: postgres:17-alpine
    container_name: trustvault-postgres
    environment:
      POSTGRES_DB: trustvault
      POSTGRES_USER: trustvault
      POSTGRES_PASSWORD: trustvault_dev_password
    ports:
      - "55432:5432"
    volumes:
      - trustvault_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustvault -d trustvault"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trustvault_postgres_data:
