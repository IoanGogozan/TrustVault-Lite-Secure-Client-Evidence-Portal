name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level moderate

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  filesystem-and-container-scan:
    name: Filesystem and Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,config
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: trustvault
          POSTGRES_USER: trustvault
          POSTGRES_PASSWORD: trustvault_dev_password
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U trustvault -d trustvault"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migrate database
        run: pnpm db:migrate
        env:
          MIGRATION_DATABASE_URL: postgres://trustvault:trustvault_dev_password@localhost:55432/trustvault

      - name: Start API
        run: pnpm dev:api > api.log 2>&1 &
        env:
          DATABASE_URL: postgres://trustvault_app:trustvault_app_dev_password@localhost:55432/trustvault

      - name: Start web
        run: pnpm dev:web > web.log 2>&1 &
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000

      - name: Wait for services
        timeout-minutes: 5
        run: |
          npx --yes wait-on --timeout 300000 http://localhost:4000/health http://localhost:3000

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        timeout-minutes: 15
        with:
          target: http://localhost:3000
          cmd_options: -a -m 2

      - name: Upload service logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-service-logs
          path: |
            api.log
            web.log

  security-report:
    name: Security Report Artifact
    runs-on: ubuntu-latest
    needs:
      - dependency-scan
      - secret-scan
      - sast
      - filesystem-and-container-scan
      - zap-baseline
    if: always()
    steps:
      - name: Generate report
        run: |
          mkdir -p security-reports
          cat > security-reports/security-summary.md <<'REPORT'
          # TrustVault Lite Security Pipeline

          This workflow runs dependency scanning, secret scanning, CodeQL SAST, Trivy filesystem/container-style scanning, and an OWASP ZAP baseline scan.

          ZAP is configured as non-blocking for the portfolio demo because baseline scans may produce informational findings that should be triaged manually.
          REPORT

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-reports/security-summary.md
