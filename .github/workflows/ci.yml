name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: trustvault
          POSTGRES_USER: trustvault
          POSTGRES_PASSWORD: trustvault_dev_password
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U trustvault -d trustvault"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          MIGRATION_DATABASE_URL: postgres://trustvault:trustvault_dev_password@localhost:55432/trustvault

      - name: Database-backed tests
        run: pnpm test:db
        env:
          DATABASE_URL: postgres://trustvault_app:trustvault_app_dev_password@localhost:55432/trustvault

      - name: Build
        run: pnpm build
